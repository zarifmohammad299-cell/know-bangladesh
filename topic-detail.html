    background: var(--light-bg);

    color: var(--white);
    padding: 12px 28px;

  .district-hero {

      localStorage.setItem('bd-theme', next);

  <script>
    function goBackToCulture(e) {
      if (window.opener && !window.opener.closed) {
        e.preventDefault();
        window.close();
        return false;
      }
      return true; // no opener (page opened directly/bookmarked) — just navigate normally
    }

    const params = new URLSearchParams(window.location.search);
    const topicName = params.get('topic');
    const wikiTitle = params.get('wiki') || topicName;

    const card = document.getElementById('topicCard');

    if (!topicName) {
      document.title = 'No Topic Selected | Know Bangladesh';
      document.getElementById('bcTopic').textContent = 'No topic selected';
      card.innerHTML =
        '<div class="error-state">' +
          '<h2>No topic selected</h2>' +
          '<p>This page shows live details for one culture topic at a time. Head back to the Culture page and click a topic to open its details here.</p>' +
          '<a href="culture.html">Go to Culture &rarr;</a>' +
        '</div>';
    } else {
      document.title = topicName + ' | Know Bangladesh';
      document.getElementById('bcTopic').textContent = topicName;
      loadTopic();
    }

    function renderError() {
      card.innerHTML =
        '<div class="error-state">' +
          '<h2>Couldn\'t load live details</h2>' +
          '<p>We couldn\'t reach the data source for "' + topicName + '" right now. You can look it up directly instead:</p>' +
          '<a href="https://en.wikipedia.org/wiki/' + encodeURIComponent(wikiTitle.replace(/ /g, '_')) + '" target="_blank" rel="noopener">Search on Wikipedia &rarr;</a>' +
        '</div>';
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function normalizeExtract(raw) {
      if (!raw) return '';
      // If the API already gave us real HTML (has <p> or <h2>/<h3> tags), use it as-is.
      if (/<p[\s>]|<h[23][\s>]/i.test(raw)) {
        return raw;
      }
      // Otherwise treat it as plain text that may contain "== Heading ==" markers
      // and blank-line-separated paragraphs, and build clean HTML ourselves.
      const lines = raw.split(/\n+/);
      let html = '';
      let paragraph = [];

      function flush() {
        if (paragraph.length) {
          html += '<p>' + paragraph.join(' ') + '</p>';
          paragraph = [];
        }
      }

      lines.forEach(function (line) {
        const trimmed = line.trim();
        if (!trimmed) { flush(); return; }
        const heading = trimmed.match(/^(={2,4})\s*(.+?)\s*\1$/);
        if (heading) {
          flush();
          const tag = heading[1].length >= 3 ? 'h3' : 'h2';
          html += '<' + tag + '>' + escapeHtml(heading[2]) + '</' + tag + '>';
        } else {
          paragraph.push(escapeHtml(trimmed));
        }
      });
      flush();
      return html;
    }

    function renderTopic(page, title, fallbackImage) {
      const image = page.thumbnail ? page.thumbnail.source : (fallbackImage || null);
      const pageUrl = (page.fullurl) ? page.fullurl
        : 'https://en.wikipedia.org/wiki/' + encodeURIComponent(wikiTitle.replace(/ /g, '_'));
      const extractHtml = normalizeExtract(page.extract) || 'No article text is available for this topic yet.';

      let html = '';
      if (image) {
        html += '<img class="district-hero" src="' + image + '" alt="' + topicName + '">';
      }
      html += '<div class="district-body">';
      html += '<h1>' + (title || topicName) + '</h1>';
      html += '<span class="division-badge">Bangladeshi Culture</span>';
      html += '<div class="district-extract">' + extractHtml + '</div>';
      html += '<a class="read-more" href="' + pageUrl + '" target="_blank" rel="noopener">Read this article on Wikipedia &rarr;</a>';
      html += '<div class="attribution">Full article text fetched live from the <a href="https://www.mediawiki.org/wiki/Extension:TextExtracts" target="_blank" rel="noopener">Wikipedia API</a> · available under <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">CC BY-SA 4.0</a></div>';
      html += '</div>';

      card.innerHTML = html;
    }

    // Some articles (list/overview-style pages especially) have no infobox image,
    // so pageimages returns nothing. When that happens, look through the article's
    // embedded images ourselves and pick the first real photo (skip icons/logos/svgs).
    function fetchFallbackImage(title) {
      const url = 'https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&redirects=1' +
        '&generator=images&gimlimit=25&titles=' + encodeURIComponent(title) +
        '&prop=imageinfo&iiprop=url|mime|size';

      return fetch(url)
        .then(function (res) { return res.ok ? res.json() : null; })
        .then(function (data) {
          const pages = data && data.query && data.query.pages;
          if (!pages) return null;
          const candidates = Object.values(pages)
            .map(function (p) { return p.imageinfo && p.imageinfo[0]; })
            .filter(function (info) {
              return info &&
                /^image\/(jpeg|png)$/.test(info.mime) &&
                info.width >= 250 && info.height >= 250;
            });
          return candidates.length ? candidates[0].url : null;
        })
        .catch(function () { return null; });
    }

    function loadTopic() {
      const apiUrl = 'https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&redirects=1' +
        '&prop=extracts|pageimages|info' +
        '&explaintext=0&exsectionformat=plain' +
        '&piprop=thumbnail&pithumbsize=1000' +
        '&inprop=url' +
        '&titles=' + encodeURIComponent(wikiTitle);

      fetch(apiUrl)
        .then(function (res) {
          if (!res.ok) throw new Error('Request failed');
          return res.json();
        })
        .then(function (data) {
          const pages = data.query && data.query.pages;
          if (!pages) throw new Error('No data');
          const page = pages[Object.keys(pages)[0]];
          if (!page || page.missing !== undefined || !page.extract) throw new Error('Not found');

          if (page.thumbnail) {
            renderTopic(page, page.title);
          } else {
            fetchFallbackImage(page.title).then(function (fallbackImage) {
              renderTopic(page, page.title, fallbackImage);
            });
          }
        })
        .catch(function () {
          renderError();
        });
    }
  </script>

    const searchInput = document.getElementById('siteSearchInput');
    const searchResults = document.getElementById('siteSearchResults');
    let activeIndex = -1;
    let currentMatches = [];

    function renderResults(matches) {
      currentMatches = matches;
      activeIndex = -1;
      if (matches.length === 0) {
        searchResults.innerHTML = '<div class="site-search-empty">No matches found</div>';
        searchResults.classList.add('open');
        return;
      }
      searchResults.innerHTML = matches.slice(0, 8).map(function (m, i) {
        return '<a class="site-search-result" data-index="' + i + '" href="' + m.url + '">' +
          '<div class="r-label">' + m.label + '</div>' +
          '<div class="r-sub">' + m.sub + '</div>' +
        '</a>';
      }).join('');
      searchResults.classList.add('open');
    }

    function runSearch(query) {
      const q = query.trim().toLowerCase();
      if (!q) {
        searchResults.classList.remove('open');
        currentMatches = [];
        return;
      }
      const matches = searchIndex.filter(function (item) {
        return item.label.toLowerCase().includes(q) || item.sub.toLowerCase().includes(q);
      });
      // Items whose label starts with the query float to the top.
      matches.sort(function (a, b) {
        const aStarts = a.label.toLowerCase().startsWith(q) ? 0 : 1;
        const bStarts = b.label.toLowerCase().startsWith(q) ? 0 : 1;
        return aStarts - bStarts;
      });
      renderResults(matches);
    }

    if (searchInput) {
      searchInput.addEventListener('input', function () {
        runSearch(searchInput.value);
      });

      searchInput.addEventListener('keydown', function (e) {
        const items = searchResults.querySelectorAll('.site-search-result');
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (items.length) {
            activeIndex = (activeIndex + 1) % items.length;
            items.forEach(function (el, i) { el.classList.toggle('active', i === activeIndex); });
          }
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (items.length) {
            activeIndex = (activeIndex - 1 + items.length) % items.length;
            items.forEach(function (el, i) { el.classList.toggle('active', i === activeIndex); });
          }
        } else if (e.key === 'Enter') {
          e.preventDefault();
          // Enter jumps straight to the highlighted result, or the best match if none is highlighted.
          const target = activeIndex >= 0 ? currentMatches[activeIndex] : currentMatches[0];
          if (target) {
            window.location.href = target.url;
          }
        } else if (e.key === 'Escape') {
          searchResults.classList.remove('open');
          searchInput.blur();
        }
      });

      // Close the dropdown when clicking elsewhere, but allow result clicks to register first.
      document.addEventListener('click', function (e) {
        if (!e.target.closest('.site-search')) {
          searchResults.classList.remove('open');
        }
      });

      searchInput.addEventListener('focus', function () {
        if (searchInput.value.trim()) {
          searchResults.classList.add('open');
        }
      });
    }
